baseURL = 'https://yingkuanwang.github.io/'
languageCode = 'zh-CN'
title = '王盈宽'
theme = 'PaperMod'
defaultContentLanguage = 'zh'

enableInlineShortcodes = true
enableRobotsTXT = true
enableEmoji = true

[pagination]
  pagerSize = 10

[params]
  description = '王盈宽的博客'
  author = '王盈宽'
  DateFormat = '2006-01-02'
  defaultTheme = 'light'
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowToc = false
  comments = false
  customCSS = ['css/custom.css']

[params.homeInfoParams]
  Title = '你好，我是王盈宽 👋'
  Content = '记录技术学习和生活思考。'

[[params.socialIcons]]
  name = 'github'
  url = 'https://github.com/yingkuanwang'

[params.assets]
  disableHLJS = true
  disableScrollBarTheme = false
  disableFingerprinting = true

[taxonomies]
  tag = 'tags'

[languages.zh]
  languageName = '中文'
  weight = 1

[languages.zh.params]
  profileMode = { enabled = false }

[[languages.zh.menu.main]]
  identifier = 'post'
  name = '文章'
  url = '/post'
  weight = 1

[[languages.zh.menu.main]]
  identifier = 'about'
  name = '关于'
  url = '/about'
  weight = 2
